<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/images/mine-logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#E8A317" />
  <link rel="apple-touch-icon" href="/images/mine-logo.jpg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MinesMinis" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Security Meta Tags -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://apis.google.com https://accounts.google.com https://*.firebaseapp.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' http://localhost:3001 https://*.supabase.co https://api.openai.com wss://*.supabase.co https://*.googleapis.com https://*.firebaseio.com https://*.google-analytics.com https://*.googletagmanager.com;
      frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://*.wordwall.net https://*.liveworksheets.com https://*.firebaseapp.com https://*.google.com;
      base-uri 'self';
      form-action 'self';
    " />


  <!-- SEO Meta Tags -->
  <title>MinesMinis - Premium English Learning Platform for Kids</title>
  <meta name="description"
    content="The most engaging and fun English learning platform for children. Interactive games, videos, and lessons that make learning enjoyable!" />
  <meta name="keywords"
    content="English learning, kids education, interactive games, educational platform, children learning" />
  <meta name="author" content="MinesMinis" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://minesminis.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://minesminis.com/" />
  <meta property="og:title" content="MinesMinis - Premium English Learning for Kids" />
  <meta property="og:description" content="Fun and engaging English learning platform for children" />
  <meta property="og:image" content="https://minesminis.com/images/minesminis-logo.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MinesMinis - Premium English Learning" />
  <meta name="twitter:description" content="Fun and engaging English learning platform for children" />
  <meta name="twitter:image" content="https://minesminis.com/images/minesminis-logo.png" />

  <!-- Preconnect for Google Fonts to speed up font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preconnect for Supabase and YouTube (commonly needed) -->
  <link rel="preconnect" href="https://bajrnvusqzllvsvipitr.supabase.co" crossorigin />
  <link rel="preconnect" href="https://img.youtube.com" />

  <!-- Preload critical logo for splash screen LCP -->
  <link rel="preload" as="image" href="/images/mine-logo.jpg" />

  <!-- Google Fonts — preloaded, non-render-blocking -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@400;500;600;700;800;900&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Nunito:wght@400;500;600;700;800;900&display=swap" /></noscript>

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "MinesMinis",
    "url": "https://minesminis.com",
    "logo": "https://minesminis.com/images/mine-logo.jpg",
    "description": "Premium gamified English learning platform for kids ages 1-10",
    "sameAs": [],
    "offers": {
      "@type": "Offer",
      "category": "Education",
      "description": "Interactive English learning games, videos, and worksheets for children"
    }
  }
  </script>

  <!-- Prevent clickjacking -->
  <style>
    html {
      display: none;
    }
  </style>
  <script>
    if (self === top) {
      document.documentElement.style.display = 'block';
    } else {
      top.location = self.location;
    }
  </script>
</head>

<body>
  <noscript>
    <div style="padding: 20px; text-align: center; font-family: sans-serif;">
      <h1>JavaScript Required</h1>
      <p>Please enable JavaScript to use MinesMinis.</p>
    </div>
  </noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
